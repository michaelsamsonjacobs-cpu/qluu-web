    <style>
        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;

        }



        body {

            font-family: 'Space Grotesk', sans-serif;

            background: #fafcfe;

            color: #1a202c;

            overflow-x: hidden;

            transition: background-color 0.5s, color 0.5s;

        }



        html.dark body {

            background: #030914;

            color: #ffffff;

        }



        #canvas {

            position: fixed;

            top: 0;

            left: 0;

            width: 100%;

            height: 100%;

            z-index: 1;

            pointer-events: none;

        }



        /* Glassmorphism nav */

        .glass-nav {

            background: rgba(250, 252, 254, 0.7);

            backdrop-filter: blur(12px);

            -webkit-backdrop-filter: blur(12px);

            border-bottom: 1px solid rgba(0, 174, 239, 0.2);

            transition: background-color 0.5s;

        }



        html.dark .glass-nav {

            background: rgba(3, 9, 20, 0.6);

            border-bottom: 1px solid rgba(0, 174, 239, 0.1);

        }



        /* Glow effects for text */

        .text-glow {

            text-shadow: 0 0 20px rgba(0, 174, 239, 0.3);

        }



        html.dark .text-glow {

            text-shadow: 0 0 20px rgba(0, 174, 239, 0.5);

        }



        /* Q target graphic filters */

        .q-target {

            filter: hue-rotate(180deg) brightness(0.6);

            transition: filter 0.5s, opacity 0.5s;

        }



        /* In light mode hover, invert makes it black, brightness 0 makes it true black if inverted */

        .q-target:hover {

            filter: hue-rotate(180deg) brightness(0);

        }



        html.dark .q-target {

            filter: hue-rotate(180deg) brightness(0.8);

        }



        html.dark .q-target:hover {

            filter: hue-rotate(180deg) brightness(1.2);

        }
    </style>

    <script>

        // Theme handled by global module below
        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1FoPFnDHca0zvP44gg3nBvVciuqzjP1NHoFpP6IWUwCo/export?format=csv';

        // Get ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        const articleSection = document.getElementById('article-content');

        if (!articleId) {
            document.getElementById('article-body').innerHTML = '<p class="text-xl text-center text-brand-cyan py-20">Article not found.</p>';
            gsap.to(articleSection, { opacity: 1, y: 0, duration: 0.8, ease: 'power2.out' });
        } else {
            Papa.parse(GOOGLE_SHEET_CSV_URL, {
                download: true,
                header: true,
                complete: function (results) {
                    const post = results.data.find(row => row.ID === articleId);

                    if (post) {
                        document.title = `QLUU | ${post.Title}`;
                        document.getElementById('article-tag').textContent = post.Tag;
                        document.getElementById('article-date').textContent = post.Date;
                        document.getElementById('article-title').textContent = post.Title;
                        document.getElementById('article-image').src = post['Image URL'];
                        document.getElementById('article-image').alt = post.Title;

                        // Render full content, fallback to summary if empty
                        const content = post['Full Article Content (HTML)'] ? post['Full Article Content (HTML)'] : `<p class="text-xl leading-relaxed text-gray-900 dark:text-brand-sepia dark:opacity-90">${post.Summary}</p><br><p class="italic text-gray-800">More details coming soon...</p>`;
                        document.getElementById('article-body').innerHTML = content;
                    } else {
                        document.getElementById('article-body').innerHTML = '<p class="text-xl text-center text-brand-cyan py-20">Article not found in database.</p>';
                    }

                    gsap.to(articleSection, { opacity: 1, y: 0, duration: 0.8, ease: 'power2.out', delay: 0.1 });
                },
                error: function (err) {
                    document.getElementById('article-body').innerHTML = '<p class="text-brand-cyan block text-center text-xl py-20">Unable to load article data from Google Sheets.</p>';
                    console.error('Failed to load article:', err);
                    gsap.to(articleSection, { opacity: 1, y: 0, duration: 0.8, ease: 'power2.out' });
                }
            });
        }

    </script>

    <script type="module">

        import * as THREE from "https://esm.sh/three@0.160.0";



        gsap.registerPlugin(ScrollTrigger);



        // Theme management

        let isDarkMode = localStorage.getItem('theme') === 'dark';

        const themeToggle = document.getElementById('theme-toggle');

        const themeIcon = document.getElementById('theme-icon');



        function setupTheme() {

            if (isDarkMode) {
                document.documentElement.classList.add('dark');
                themeIcon.textContent = '☀️';
            } else {
                document.documentElement.classList.remove('dark');
                themeIcon.textContent = '🌙';
            }

        }

        setupTheme();



        // Scene setup

        const scene = new THREE.Scene();

        scene.fog = new THREE.FogExp2(isDarkMode ? 0x030914 : 0xfafcfe, 0.015);



        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true, antialias: true, powerPreference: "high-performance" });

        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        renderer.setSize(window.innerWidth, window.innerHeight);

        renderer.setClearColor(isDarkMode ? 0x030914 : 0xfafcfe, 1);



        // Camera position

        camera.position.z = 20;



        // Parallax groups for different layer speeds

        const parallaxGroups = [

            new THREE.Group(), // Foreground - fastest

            new THREE.Group(), // Mid-ground

            new THREE.Group(), // Background - slowest

        ];



        parallaxGroups.forEach(group => scene.add(group));



        const textureLoader = new THREE.TextureLoader();

        const cb = '?v=' + Date.now(); // Cache buster to ensure fresh assets



        // Dark Mode Textures

        const ugvTexDark = textureLoader.load('./assets/ugv_3d.png' + cb);

        const droneTexDark = textureLoader.load('./assets/drone_1.png' + cb);



        // Light Mode Textures (same as gov/drones pages)

        const ugvTexLight = textureLoader.load('./assets/ugv_3d_exact_alpha.png' + cb);

        const droneTexLight = textureLoader.load('./assets/drone_1_exact_alpha.png' + cb);

        const cyclopsTexLight = droneTexLight;

        const sentinelTexLight = ugvTexLight;



        // Initialize materials based on current theme
        const initBlend = isDarkMode ? THREE.AdditiveBlending : THREE.NormalBlending;
        const initColor = isDarkMode ? 0x1e3a8a : 0x0a1628;
        const initDroneTex = isDarkMode ? droneTexDark : droneTexLight;
        const initUgvTex = isDarkMode ? ugvTexDark : ugvTexLight;

        const droneMat1 = new THREE.MeshBasicMaterial({ map: initDroneTex, transparent: true, opacity: 0.68, side: THREE.DoubleSide, blending: initBlend, depthWrite: false, color: initColor });

        const ugvMat = new THREE.MeshBasicMaterial({ map: initUgvTex, transparent: true, opacity: 0.68, side: THREE.DoubleSide, blending: initBlend, depthWrite: false, color: initColor });

        const cyclopsMat = new THREE.MeshBasicMaterial({ map: isDarkMode ? droneTexDark : cyclopsTexLight, transparent: true, opacity: 0.68, side: THREE.DoubleSide, blending: initBlend, depthWrite: false, color: initColor });

        const sentinelMat = new THREE.MeshBasicMaterial({ map: isDarkMode ? ugvTexDark : sentinelTexLight, transparent: true, opacity: 0.68, side: THREE.DoubleSide, blending: initBlend, depthWrite: false, color: initColor });



        const materials = [droneMat1, ugvMat, cyclopsMat, sentinelMat];

        const dimmedMaterials = []; // Track cloned materials from Layer 3

        const shapes = [];



        // Theme Toggle Logic for ThreeJS

        themeToggle.addEventListener('click', () => {

            isDarkMode = !isDarkMode;

            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');

            if (isDarkMode) {

                document.documentElement.classList.add('dark');

                themeIcon.textContent = '☀️';

            } else {

                document.documentElement.classList.remove('dark');

                themeIcon.textContent = '🌙';

            }



            const bgColor = isDarkMode ? 0x030914 : 0xfafcfe;

            renderer.setClearColor(bgColor, 1);

            scene.fog.color.setHex(bgColor);



            droneMat1.map = isDarkMode ? droneTexDark : droneTexLight;

            ugvMat.map = isDarkMode ? ugvTexDark : ugvTexLight;



            // To ensure Dark Mode stays perfectly clean per visuals, we fallback the inspiration shapes to standard clean 3D elements in dark mode.

            cyclopsMat.map = isDarkMode ? droneTexDark : cyclopsTexLight;

            sentinelMat.map = isDarkMode ? ugvTexDark : sentinelTexLight;



            materials.forEach(mat => {

                mat.blending = isDarkMode ? THREE.AdditiveBlending : THREE.NormalBlending;

                mat.color.setHex(isDarkMode ? 0x1e3a8a : 0x0a1628);

                mat.needsUpdate = true;

            });



            // Also update the cloned dimmed materials from Layer 3
            dimmedMaterials.forEach(mat => {
                // Find which base material this was cloned from and use same texture
                mat.blending = isDarkMode ? THREE.AdditiveBlending : THREE.NormalBlending;
                mat.color.setHex(isDarkMode ? 0x1e3a8a : 0x0a1628);
                mat.map = mat._baseMat.map; // sync texture from the already-updated base
                mat.needsUpdate = true;
            });

        });



        // Layer 1 - Foreground (fastest parallax)

        for (let i = 0; i < 10; i++) {

            const material = materials[Math.floor(Math.random() * materials.length)];

            const size = Math.random() * 2.5 + 1.5;

            const geom = new THREE.PlaneGeometry(size, size);

            const shape = new THREE.Mesh(geom, material);



            shape.position.set(

                (Math.random() - 0.5) * 60,

                (Math.random() - 0.5) * 45,

                Math.random() * 10 + 8

            );



            const baseRotZ = Math.random() * Math.PI * 2;

            shape.rotation.set(0, 0, baseRotZ);



            parallaxGroups[0].add(shape);

            shapes.push({

                mesh: shape, layer: 0,

                speed: Math.random() * 0.6 + 0.9,

                rotationSpeed: (Math.random() - 0.5) * 0.05,

                initialY: shape.position.y,

                isDrone: true,

                baseRotationZ: baseRotZ

            });

        }



        // Layer 2 - Mid-ground

        for (let i = 0; i < 16; i++) {

            const material = materials[Math.floor(Math.random() * materials.length)];

            const size = Math.random() * 3.5 + 2.0;

            const geom = new THREE.PlaneGeometry(size, size);

            const shape = new THREE.Mesh(geom, material);



            shape.position.set(

                (Math.random() - 0.5) * 80,

                (Math.random() - 0.5) * 55,

                Math.random() * 15 - 5

            );



            const baseRotZ = Math.random() * Math.PI * 2;

            shape.rotation.set(0, 0, baseRotZ);



            parallaxGroups[1].add(shape);

            shapes.push({

                mesh: shape, layer: 1,

                speed: Math.random() * 0.4 + 0.5,

                rotationSpeed: (Math.random() - 0.5) * 0.03,

                initialY: shape.position.y,

                isDrone: true,

                baseRotationZ: baseRotZ

            });

        }



        // Removed fixed background hero images based on new direction.



        // Layer 3 - Background (slowest parallax)

        for (let i = 0; i < 23; i++) {

            const material = materials[Math.floor(Math.random() * materials.length)];

            const size = Math.random() * 4.5 + 2.5;

            const dimmedMat = material.clone();

            dimmedMat.opacity = 0.24;
            dimmedMat._baseMat = material; // track which base material this was cloned from
            dimmedMaterials.push(dimmedMat);

            const geom = new THREE.PlaneGeometry(size, size);

            const shape = new THREE.Mesh(geom, dimmedMat);



            shape.position.set(

                (Math.random() - 0.5) * 110,

                (Math.random() - 0.5) * 80,

                Math.random() * 20 - 30

            );



            const baseRotZ = (Math.random() - 0.5) * 0.8; // Biased upright

            shape.rotation.set(0, 0, baseRotZ);



            parallaxGroups[2].add(shape);

            shapes.push({

                mesh: shape, layer: 2,

                speed: Math.random() * 0.25 + 0.15,

                rotationSpeed: (Math.random() - 0.5) * 0.02,

                initialY: shape.position.y,

                isDrone: true,

                baseRotationZ: baseRotZ

            });

        }



        // Scroll variables

        let scrollY = 0;

        let mouseX = 0;

        let mouseY = 0;

        let targetX = 0;

        let targetY = 0;



        // Smooth Mouse movement using lerp variables

        document.addEventListener('mousemove', (event) => {

            targetX = (event.clientX / window.innerWidth) * 2 - 1;

            targetY = -(event.clientY / window.innerHeight) * 2 + 1;

        });



        // Scroll tracking

        ScrollTrigger.create({

            trigger: "body",

            start: "top top",

            end: "bottom bottom",

            scrub: true,

            onUpdate: (self) => {

                scrollY = self.progress;

            }

        });



        // GSAP text animations
        const sections = document.querySelectorAll("section");
        const quotes = document.querySelectorAll("p[class*='italic']");

        sections.forEach((section) => {
            const elements = Array.from(section.querySelectorAll(".opacity-0"));

            if (elements.length > 0) {
                ScrollTrigger.create({
                    trigger: section,
                    start: "top 75%",
                    onEnter: () => {
                        gsap.to(elements, {
                            opacity: 1,
                            y: 0,
                            duration: 1.0,
                            stagger: 0.2,
                            ease: "power3.out"
                        });
                    },
                    onLeaveBack: () => {
                        gsap.to(elements, { opacity: 0, y: 48, duration: 0.6 });
                    }
                });
            }
        });



        quotes.forEach((quote) => {

            ScrollTrigger.create({

                trigger: quote,

                start: "top 80%",

                onEnter: () => gsap.to(quote, { opacity: 1, y: 0, duration: 1.3, ease: "power2.out" }),

                onLeaveBack: () => gsap.to(quote, { opacity: 0, y: 32, duration: 0.6 })

            });

        });



        // Animation loop

        const clock = new THREE.Clock();



        function animate() {

            requestAnimationFrame(animate);



            const time = clock.getElapsedTime();



            // Smooth mouse interpolation

            mouseX += (targetX - mouseX) * 0.05;

            mouseY += (targetY - mouseY) * 0.05;



            // Parallax movement based on scroll

            // Move entire groups slightly up as we scroll down

            parallaxGroups[0].position.y = scrollY * 35; // Fastest

            parallaxGroups[1].position.y = scrollY * 20; // Medium

            parallaxGroups[2].position.y = scrollY * 10;  // Slowest



            // Mouse parallax with subtle rotation

            parallaxGroups[0].rotation.x = mouseY * 0.15;

            parallaxGroups[0].rotation.y = mouseX * 0.15;

            parallaxGroups[1].rotation.x = mouseY * 0.08;

            parallaxGroups[1].rotation.y = mouseX * 0.08;

            parallaxGroups[2].rotation.x = mouseY * 0.04;

            parallaxGroups[2].rotation.y = mouseX * 0.04;



            // Individual shape animations

            shapes.forEach((shapeData) => {

                const { mesh, speed, rotationSpeed, isHeroImage, isDrone } = shapeData;



                if (isHeroImage) {

                    // Unique floating logic for images (like the 3d generated graphic)

                    mesh.rotation.z = Math.sin(time * 0.5) * rotationSpeed * 20;

                    mesh.rotation.y = Math.cos(time * 0.3) * rotationSpeed * 10;

                    mesh.position.y += Math.sin(time * speed + mesh.position.x) * 0.01;

                } else if (isDrone) {

                    // Drones face mostly forward, wobbling slightly

                    mesh.rotation.z = Math.sin(time * 1.5) * rotationSpeed * 2.5 + shapeData.baseRotationZ;

                    mesh.rotation.y = Math.cos(time * 1.3) * rotationSpeed * 5;

                    mesh.rotation.x = Math.sin(time * 1.4) * rotationSpeed * 5;

                    mesh.position.y += Math.sin(time * speed * 2 + mesh.position.x) * 0.02;



                    // Wrap around

                    if (mesh.position.y - parallaxGroups[shapeData.layer].position.y < -50) {

                        mesh.position.y += 100;

                    } else if (mesh.position.y - parallaxGroups[shapeData.layer].position.y > 50) {

                        mesh.position.y -= 100;

                    }

                } else {

                    // Regular geometric rotation

                    mesh.rotation.x += rotationSpeed;

                    mesh.rotation.y += rotationSpeed * 0.8;

                    mesh.rotation.z += rotationSpeed * 0.5;



                    // Floating motion

                    mesh.position.y += Math.sin(time * 1.5 + mesh.position.x) * 0.015;



                    // Wrap around effect for continuous scrolling

                    // Adjust wrapper bounds for smoother transitions

                    if (mesh.position.y - parallaxGroups[shapeData.layer].position.y < -50) {

                        mesh.position.y += 100;

                    } else if (mesh.position.y - parallaxGroups[shapeData.layer].position.y > 50) {

                        mesh.position.y -= 100;

                    }

                }

            });



            renderer.render(scene, camera);

        }



        // Handle window resize

        window.addEventListener('resize', () => {

            camera.aspect = window.innerWidth / window.innerHeight;

            camera.updateProjectionMatrix();

            renderer.setSize(window.innerWidth, window.innerHeight);

        });



        // Initialize animation

        animate();

    </script>

<script>

    document.addEventListener('contextmenu', function(e) {
        if (e.target.tagName === 'IMG') {
            e.preventDefault();
        }
    });
    document.addEventListener('dragstart', function(e) {
        if (e.target.tagName === 'IMG') {
            e.preventDefault();
        }
    });
</script>
