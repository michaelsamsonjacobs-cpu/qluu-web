    <script>

        // Theme management

        const themeToggle = document.getElementById('theme-toggle');

        const themeIcon = document.getElementById('theme-icon');

        let isDarkMode = localStorage.getItem('theme') === 'dark';



        function applyTheme(dark) {

            if (dark) {

                document.documentElement.classList.add('dark');

                themeIcon.textContent = '☀️';

            } else {

                document.documentElement.classList.remove('dark');

                themeIcon.textContent = '🌙';

            }

        }



        applyTheme(isDarkMode);



        themeToggle.addEventListener('click', () => {

            isDarkMode = !isDarkMode;

            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');

            applyTheme(isDarkMode);

        });



        // Load blog posts from posts.json

        const grid = document.getElementById('blog-grid');



        fetch('./posts.json')

            .then(res => res.json())

            .then(posts => {

                posts.forEach((post, i) => {

                    const card = document.createElement('a');

                    card.href = post.url;

                    card.className = 'blog-card rounded-xl overflow-hidden block';

                    card.style.opacity = '0';

                    card.style.transform = 'translateY(40px)';

                    card.innerHTML = `

                        <div class="overflow-hidden h-48">

                            <img src="${post.image}" alt="${post.title}" class="w-full h-full object-cover">

                        </div>

                        <div class="p-6">

                            <div class="flex items-center gap-3 mb-3">

                                <span class="tag text-xs font-bold uppercase tracking-widest px-3 py-1 rounded-full">${post.tag}</span>

                                <span class="text-xs text-gray-800 dark:text-gray-400 font-medium">${post.date}</span>

                            </div>

                            <h3 class="text-lg font-bold mb-2 text-gray-900 dark:text-white leading-snug">${post.title}</h3>

                            <p class="text-sm text-gray-800 dark:text-gray-400 leading-relaxed line-clamp-3">${post.summary}</p>

                        </div>

                    `;

                    grid.appendChild(card);

                });



                // Animate cards in AFTER they are in the DOM

                gsap.to('.blog-card', {

                    opacity: 1,

                    y: 0,

                    duration: 0.6,

                    stagger: 0.1,

                    delay: 0.6,

                    ease: 'power2.out'

                });

            })

            .catch(err => {

                grid.innerHTML = '<p class="text-brand-cyan col-span-3 text-center text-xl py-20">Unable to load posts. Check that posts.json exists.</p>';

                console.error('Failed to load posts:', err);

            });

    </script>


<script>
    // Prevent right-click and dragging on images to disable downloads
    document.addEventListener('contextmenu', function(e) {
        if (e.target.tagName === 'IMG') {
            e.preventDefault();
        }
    });
    document.addEventListener('dragstart', function(e) {
        if (e.target.tagName === 'IMG') {
            e.preventDefault();
        }
    });
</script>
